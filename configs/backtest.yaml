mode: backtest
data:
  data_dir: data/raw
  source: alpaca
  timeframe: 1Min
  timezone: America/Los_Angeles
  symbols: [SPY]
  start: "2026-05-12"
  end: "2026-05-13"
strategy:
  name: moving_average_crossover
  parameters:
    fast_window: 5
    slow_window: 20
    target_notional_fraction: 0.95
risk:
