mode: backtest
data:
  data_dir: data/raw
  data_file: data/raw/sample_bars.csv
  source: local
  timeframe: 1Min
  timezone: America/Los_Angeles
  symbols: [SPY]
  start: "2024-01-02T14:30:00Z"
  end: "2024-01-03T21:00:00Z"
strategy:
  name: moving_average_crossover
  parameters:
    fast_window: 5
    slow_window: 20
    target_notional_fraction: 0.5
    order_type: market
    time_in_force: day
    # For limit/stop experiments, use offsets from the signal bar close:
    # limit_price_offset_bps: 5
    # stop_price_offset_bps: 10
risk:
  max_gross_exposure: 1.0
  max_symbol_exposure: 1.0
  max_position_notional: 95000
  max_order_notional: 50000
  max_position_quantity: 1000
  max_daily_loss: 5000
  allow_short: true
  kill_switch: false
  trading_session_start: "06:30"
  trading_session_end: "13:00"
backtest:
  initial_cash: 100000
  commission_per_share: 0.0
  slippage_bps: 1.0
  latency_bars: 1
  market_fill_price: open
  limit_fill_price: limit
  stop_fill_price: stop
  intrabar_price_path: open_high_low_close
  max_fill_volume_pct: 0.1
  allow_partial_fills: true
  annualization_periods: 252
  output_dir: reports/backtests
