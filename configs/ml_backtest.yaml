mode: backtest
data:
  data_dir: data/raw
  data_file: data/raw/sample_bars.csv
  source: local
  timeframe: 1Min
  timezone: America/Los_Angeles
  symbols: [SPY]
  start: "2024-01-02T14:30:00Z"
  end: "2024-01-03T21:00:00Z"
strategy:
  name: baseline_ml
  parameters:
    model_path: models/baseline_logistic.joblib
    long_threshold: 0.55
    short_threshold: 0.45
    target_notional_fraction: 0.95
    order_type: market
    time_in_force: day
risk:
  max_gross_exposure: 1.0
  max_symbol_exposure: 1.0
  max_position_notional: 95000
  max_order_notional: 50000
  max_position_quantity: 1000
  max_daily_loss: 5000
  allow_short: true
  kill_switch: false
  trading_session_start: "06:30"
  trading_session_end: "13:00"
backtest:
  initial_cash: 100000
  commission_per_share: 0.0
  commission_bps: 0.0
  fixed_commission: 0.0
  slippage_bps: 2.0
  latency_bars: 1
  latency_seconds: 0
  market_order_fill: next_open
  limit_fill_price: limit
  stop_fill_price: stop
  intrabar_price_path: open_high_low_close
  volume_participation_limit: 0.05
  allow_partial_fills: false
  enforce_buying_power: true
  max_leverage: 1.0
  annualization_periods: 252
  infer_annualization_periods: true
  output_dir: reports/ml_backtests
