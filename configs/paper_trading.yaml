mode: paper
data:
  data_dir: data/raw
  source: alpaca
  timeframe: 1Min
  timezone: America/Los_Angeles
  symbols: [SPY]
strategy:
  name: moving_average_crossover
  parameters:
    fast_window: 5
    slow_window: 20
    target_notional_fraction: 0.25
risk:
  max_gross_exposure: 0.5
  max_symbol_exposure: 0.25
  max_position_notional: 25000
  max_daily_loss: 1000
  allow_short: false
  kill_switch: false
execution:
  broker: alpaca
  paper: true
  dry_run: true
  live_trading_enabled: false
  poll_interval_seconds: 5
